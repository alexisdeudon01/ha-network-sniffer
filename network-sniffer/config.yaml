name: "Network Sniffer → Elasticsearch"
description: "Captures network packets with tcpdump and ships them to Elasticsearch."
version: "1.0.0"
slug: network_sniffer
init: false
arch:
  - aarch64
  - amd64
  - armv7
host_network: true
privileged: true
options:
  interface: "eth0"
  es_host: "http://your-ec2-ip:9200"
  es_index: "packets"
  es_username: "elastic"
  es_password: ""
  batch_size: 50
schema:
  interface: str
  es_host: str
  es_index: str
  es_username: str
  es_password: str
  batch_size: int
